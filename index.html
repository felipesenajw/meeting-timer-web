<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Timer para Reuniões</title>
    
    <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/felipesenajw/meeting-timer-web@main/icon.png">
    <link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/gh/felipesenajw/meeting-timer-web@main/icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#5a3d8d">

    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <style>
        :root {
            --primary-color: #5a3d8d;
            --tesouros: #2a6d7a;
            --ministerio: #b38f00;
            --vida-crista: #9e2a2b;
            --danger-color: #dc3545;
            --warning-color: #ffc107;
            --success-color: #28a745;
            --bg-color: #f0f2f5;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-color: #2d3436;
            --border-color: rgba(0,0,0,0.08);
            --nav-bg: rgba(255, 255, 255, 0.75);
        }

        [data-theme="dark"] {
            --bg-color: #0a0a0a;
            --card-bg: rgba(35, 35, 35, 0.9);
            --text-color: #e0e0e0;
            --border-color: rgba(255,255,255,0.08);
            --nav-bg: rgba(20, 20, 20, 0.8);
            --primary-color: #bb93ff;
        }

        * { font-family: 'Ubuntu', sans-serif; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 10px 10px 140px 10px; transition: background 0.3s; }

        .container { max-width: 500px; margin: auto; }
        h2 { color: var(--primary-color); text-align: center; font-size: 1.4rem; margin: 20px 0; font-weight: 700; }

        .tabs { 
            display: flex; border-radius: 16px; background: var(--nav-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 5px; gap: 5px; margin-bottom: 25px; position: sticky; top: 10px; z-index: 900; border: 1px solid var(--border-color);
        }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-radius: 12px; font-weight: 600; font-size: 0.85rem; border: none; color: var(--text-color); background: transparent; transition: 0.3s; }
        .tab.active { background: var(--primary-color); color: #ffffff !important; box-shadow: 0 4px 12px rgba(90, 61, 141, 0.2); }

        .content { display: none; }
        .content.active { display: block; }

        .accordion { margin-bottom: 15px; border-radius: 20px; overflow: hidden; border: 1px solid var(--border-color); background: var(--card-bg); }
        .accordion-header { padding: 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; color: white; font-weight: 700; font-size: 0.85rem; }
        .accordion-content { display: none; padding: 12px; }
        .accordion-content.open { display: block; }

        .part-card { 
            background: var(--card-bg); border: 1px solid var(--border-color); padding: 18px; border-radius: 18px; margin-bottom: 12px; 
            border-left: 8px solid #ccc; position: relative; overflow: hidden; transition: all 0.4s ease;
        }
        .color-tesouros { border-left-color: var(--tesouros); }
        .color-ministerio { border-left-color: var(--ministerio); }
        .color-vida-crista { border-left-color: var(--vida-crista); }
        .color-fim { border-left-color: var(--primary-color); }

        .card-warning { background: rgba(255, 193, 7, 0.1) !important; border-color: var(--warning-color) !important; }
        .card-danger { background: rgba(220, 53, 69, 0.1) !important; border-color: var(--danger-color) !important; animation: pulse-danger 2s infinite; }
        .text-danger { color: var(--danger-color) !important; font-weight: 800 !important; }

        @keyframes pulse-danger {
            0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.2); }
            70% { box-shadow: 0 0 0 10px rgba(220, 53, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
        }

        .progress-bar { position: absolute; top: 0; left: 0; height: 4px; background: var(--success-color); width: 0%; transition: width 1s linear; }
        .progress-warning { background: var(--warning-color); }
        .progress-over { background: var(--danger-color); }

        .status-dot { width: 8px; height: 8px; background: var(--success-color); border-radius: 50%; display: none; margin-left: 8px; }
        .running .status-dot { display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .participant-input, .modal input, .start-time-input { width: 100%; border: 1px solid transparent; border-radius: 12px; background: rgba(0,0,0,0.04); color: var(--text-color); font-size: 0.95rem; padding: 12px; outline: none; margin-top: 8px; }
        [data-theme="dark"] .participant-input, [data-theme="dark"] .modal input, [data-theme="dark"] .start-time-input { background: rgba(255,255,255,0.05); }
        
        .timer-row { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .timer-display { font-size: 2.2rem; font-weight: 700; letter-spacing: -1px; cursor: pointer; }

        .icon-btn { border: none; width: 44px; height: 44px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; transition: transform 0.1s; }
        .icon-btn:active { transform: scale(0.9); }
        .btn-play { background: var(--primary-color); }
        .btn-pause { background: var(--danger-color); }
        .btn-pip { background: transparent; border: 1px solid var(--border-color); color: var(--text-color); }

        .btn-config-action { width: 32px; height: 32px; border-radius: 10px; border: none; color: white; position: absolute; display: none; align-items: center; justify-content: center; z-index: 10; }
        .btn-delete { background: #333; top: 10px; right: 10px; }
        .btn-edit { background: var(--primary-color); top: 10px; right: 48px; }
        .config-mode .btn-config-action { display: flex; }
        .drag-handle { display: none; align-items: center; gap: 5px; font-size: 0.75rem; background: var(--primary-color); color: white; padding: 6px 12px; border-radius: 10px; margin-bottom: 12px; cursor: grab; width: fit-content; }
        .config-mode .drag-handle { display: flex; }
        .btn-add-part { width: 100%; padding: 14px; background: transparent; border: 2px dashed var(--border-color); color: var(--text-color); border-radius: 16px; font-weight: 700; cursor: pointer; display: none; align-items: center; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .config-mode .btn-add-part { display: flex; }

        .total-box { text-align: center; padding: 25px; background: var(--card-bg); border-radius: 24px; border: 1px solid var(--border-color); margin-top: 25px; }
        .prediction-row { margin-top: 15px; padding-top: 15px; border-top: 1px dashed var(--border-color); }
        .start-time-input { width: 100px; text-align: center; margin: 5px auto; padding: 5px; font-weight: 700; color: var(--primary-color); }

        .action-area { margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-footer-action { background: transparent; border: 1px solid var(--border-color); color: var(--text-color); padding: 14px; border-radius: 16px; font-weight: 700; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-danger-outline { border-color: var(--danger-color); color: var(--danger-color); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--nav-bg); backdrop-filter: blur(15px); border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; padding: 15px 0 35px 0; z-index: 1000; border-radius: 24px 24px 0 0; }
        .nav-item { background: none; border: none; color: var(--text-color); cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; font-weight: 500; gap: 4px; }
        .nav-item.active-mode { color: var(--success-color); font-weight: 700; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 9999; justify-content: center; align-items: center; padding: 20px; }
        .modal { background: var(--card-bg); color: var(--text-color); padding: 25px; border-radius: 24px; width: 100%; max-width: 360px; border: 1px solid var(--border-color); }
        .modal-footer { display: flex; gap: 10px; margin-top: 25px; }
        .modal-btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; }
        
        #pipCanvas { display: none; }
        #pipVideo { width: 1px; height: 1px; position: fixed; bottom: 0; right: 0; opacity: 0; pointer-events: none; }
    </style>
</head>
<body id="body">

<div class="container">
    <h2>Timer para Reuniões</h2>

    <div class="tabs">
        <button class="tab active" id="tab-btn-meio" onclick="switchTab('meio')">Meio de Semana</button>
        <button class="tab" id="tab-btn-fim" onclick="switchTab('fim')">Fim de Semana</button>
    </div>

    <div id="meio" class="content active">
        <div class="accordion">
            <div class="accordion-header" style="background-color:var(--tesouros)" onclick="toggleAcc('acc-tesouros', this)">TESOUROS DA PALAVRA DE DEUS <span class="material-icons">expand_more</span></div>
            <div id="acc-tesouros-wrap" class="accordion-content">
                <div id="acc-tesouros" class="sortable-list"></div>
                <button class="btn-add-part" onclick="prepareAdd('acc-tesouros')"><span class="material-icons">add_circle</span> Nova Parte</button>
            </div>
        </div>
        <div class="accordion">
            <div class="accordion-header" style="background-color:var(--ministerio)" onclick="toggleAcc('acc-ministerio', this)">FAÇA SEU MELHOR NO MINISTÉRIO <span class="material-icons">expand_more</span></div>
            <div id="acc-ministerio-wrap" class="accordion-content">
                <div id="acc-ministerio" class="sortable-list"></div>
                <button class="btn-add-part" onclick="prepareAdd('acc-ministerio')"><span class="material-icons">add_circle</span> Nova Parte</button>
            </div>
        </div>
        <div class="accordion">
            <div class="accordion-header" style="background-color:var(--vida-crista)" onclick="toggleAcc('acc-vida', this)">NOSSA VIDA CRISTÃ <span class="material-icons">expand_more</span></div>
            <div id="acc-vida-wrap" class="accordion-content">
                <div id="acc-vida" class="sortable-list"></div>
                <button class="btn-add-part" onclick="prepareAdd('acc-vida')"><span class="material-icons">add_circle</span> Nova Parte</button>
            </div>
        </div>
        
        <div class="total-box">
            <div style="font-size:0.7rem; font-weight:700; opacity:0.6; margin-bottom:5px">TEMPO TOTAL DA REUNIÃO</div>
            <span id="total-meio" style="font-size:3.5rem; font-weight:800; color:var(--primary-color)">00:00</span>
            <div class="prediction-row">
                <div style="font-size:0.65rem; font-weight:700; opacity:0.5; text-transform: uppercase;">Início da Reunião</div>
                <input type="time" class="start-time-input" id="start-meio" oninput="updateTotals()">
                <div id="end-meio" style="font-size:1.1rem; font-weight:700; color:var(--success-color); margin-top:5px">Término previsto: --:--</div>
            </div>
        </div>
        <div class="action-area">
            <button class="btn-footer-action btn-danger-outline" onclick="confirmResetAll('meio')"><span class="material-icons">timer_off</span> Zerar Tempo</button>
            <button class="btn-footer-action" onclick="confirmClearNames('meio')"><span class="material-icons">cleaning_services</span> Limpar Dados</button>
        </div>
    </div>

    <div id="fim" class="content">
        <div id="list-fim" class="sortable-list"></div>
        <button class="btn-add-part" onclick="prepareAdd('list-fim')"><span class="material-icons">add_circle</span> Nova Parte</button>
        <div class="total-box">
            <div style="font-size:0.7rem; font-weight:700; opacity:0.6; margin-bottom:5px">TEMPO TOTAL DA REUNIÃO</div>
            <span id="total-fim" style="font-size:3.5rem; font-weight:800; color:var(--primary-color)">00:00</span>
            <div class="prediction-row">
                <div style="font-size:0.65rem; font-weight:700; opacity:0.5; text-transform: uppercase;">Início da Reunião</div>
                <input type="time" class="start-time-input" id="start-fim" oninput="updateTotals()">
                <div id="end-fim" style="font-size:1.1rem; font-weight:700; color:var(--success-color); margin-top:5px">Término previsto: --:--</div>
            </div>
        </div>
        <div class="action-area">
            <button class="btn-footer-action btn-danger-outline" onclick="confirmResetAll('fim')"><span class="material-icons">timer_off</span> Zerar Tempo</button>
            <button class="btn-footer-action" onclick="confirmClearNames('fim')"><span class="material-icons">cleaning_services</span> Limpar Dados</button>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <button class="nav-item" onclick="openHistory()"><span class="material-icons">history</span>Histórico</button>
    <button class="nav-item" onclick="toggleTheme()"><span class="material-icons">brightness_medium</span>Tema</button>
    <button class="nav-item" id="btn-config-nav" onclick="toggleConfig()"><span class="material-icons" id="config-icon">tune</span> Ajustar</button>
    <button class="nav-item" onclick="sendWhatsApp()" style="color:var(--success-color)"><span class="material-icons">share</span>Enviar</button>
</nav>

<canvas id="pipCanvas" width="300" height="200"></canvas>
<video id="pipVideo" autoplay muted playsinline loop></video>
<audio id="silentAudio" loop><source src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==" type="audio/wav"></audio>

<div id="customModal" class="modal-overlay" onclick="if(event.target == this) closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
        <h3 id="modalTitle" style="margin-top:0">Aviso</h3>
        <div id="modalBody"></div>
        <div class="modal-footer">
            <button class="modal-btn" id="modalCancelBtn" onclick="closeModal()" style="background:var(--border-color); color:var(--text-color)">Cancelar</button>
            <button class="modal-btn" style="background:var(--primary-color); color:white" id="modalConfirmBtn">Confirmar</button>
        </div>
    </div>
</div>

<script>
    let wakeLock = null;
    let pipSessionActive = false;
    let currentActiveId = null;

    async function requestWakeLock() {
        try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
    }

    const defaultParts = [
        { id: "fixed_inicio", nome: "Comentários iniciais", meta: 1, container: "acc-tesouros", cor: "color-tesouros" },
        { id: "p1", nome: "Tesouros da Palavra", meta: 10, container: "acc-tesouros", cor: "color-tesouros" },
        { id: "p2", nome: "Joias Espirituais", meta: 10, container: "acc-tesouros", cor: "color-tesouros" },
        { id: "p3", nome: "Leitura da Bíblia", meta: 4, container: "acc-tesouros", cor: "color-tesouros" },
        { id: "p4", nome: "Parte 1", meta: 5, container: "acc-ministerio", cor: "color-ministerio" },
        { id: "p5", nome: "Parte 2", meta: 5, container: "acc-ministerio", cor: "color-ministerio" },
        { id: "p6", nome: "Parte 3", meta: 5, container: "acc-ministerio", cor: "color-ministerio" },
        { id: "p7", nome: "Parte 1", meta: 15, container: "acc-vida", cor: "color-vida-crista" },
        { id: "p8", nome: "Estudo Bíblico", meta: 30, container: "acc-vida", cor: "color-vida-crista" },
        { id: "fixed_fim", nome: "Comentários finais", meta: 3, container: "acc-vida", cor: "color-vida-crista" },
        { id: "p9", nome: "Discurso Público", meta: 30, container: "list-fim", cor: "color-fim" },
        { id: "p10", nome: "Estudo de A Sentinela", meta: 60, container: "list-fim", cor: "color-fim" }
    ];

    let meetingParts = JSON.parse(localStorage.getItem('jw_parts_v49')) || [...defaultParts];
    
    meetingParts = meetingParts.map(p => {
        if(p.id === 'fixed_inicio') return { ...p, nome: "Comentários iniciais", cor: "color-tesouros", container: "acc-tesouros" };
        if(p.id === 'fixed_fim') return { ...p, nome: "Comentários finais", cor: "color-vida-crista", container: "acc-vida" };
        return p;
    });

    let timers = JSON.parse(localStorage.getItem('jw_timers_v49')) || {};
    let participants = JSON.parse(localStorage.getItem('jw_names_v49')) || {};
    let history = JSON.parse(localStorage.getItem('jw_history_v49')) || [];

    function save() { 
        localStorage.setItem('jw_timers_v49', JSON.stringify(timers)); 
        localStorage.setItem('jw_parts_v49', JSON.stringify(meetingParts)); 
        localStorage.setItem('jw_names_v49', JSON.stringify(participants));
    }

    function render() {
        const isConfig = document.getElementById('body').classList.contains('config-mode');
        document.querySelectorAll('.sortable-list').forEach(c => {
            c.innerHTML = "";
            new Sortable(c, {
                animation: 300, handle: '.drag-handle', ghostClass: 'sortable-ghost',
                disabled: !isConfig,
                onEnd: () => {
                    const newOrder = [];
                    document.querySelectorAll('.part-card').forEach(card => {
                        const id = card.id.replace('card-', '');
                        const part = meetingParts.find(p => p.id === id);
                        if(part) newOrder.push(part);
                    });
                    meetingParts = [...newOrder]; save();
                }
            });
        });

        meetingParts.forEach(p => {
            if (!timers[p.id]) timers[p.id] = { sec: 0, running: false };
            const container = document.getElementById(p.container);
            if(!container) return;
            const isRunning = timers[p.id].running;
            const isFixed = p.id.startsWith('fixed_');

            container.innerHTML += `
                <div class="part-card ${p.cor} ${isRunning ? 'running' : ''}" id="card-${p.id}">
                    <div class="progress-bar" id="prog-${p.id}"></div>
                    ${!isFixed ? `
                        <button class="btn-config-action btn-delete" onclick="confirmDelete('${p.id}')"><span class="material-icons" style="font-size:18px">delete</span></button>
                        <button class="btn-config-action btn-edit" onclick="openEditModal('${p.id}')"><span class="material-icons" style="font-size:18px">edit</span></button>
                    ` : ''}
                    <div class="drag-handle"><span class="material-icons" style="font-size:14px">drag_indicator</span> Arrastar</div>
                    <div class="main-content">
                        <div style="font-weight:700; font-size:0.75rem; opacity:0.6; display:flex; align-items:center">
                            ${p.nome} (${p.meta} min) <span class="status-dot"></span>
                        </div>
                        ${!isFixed ? `
                            <input type="text" class="participant-input" placeholder="Participante..." value="${participants[p.id] || ''}" oninput="saveName('${p.id}', this.value)">
                        ` : '<div style="margin-top:10px"></div>'}
                        <div class="timer-row">
                            <div class="timer-display" onclick="openAdjustModal('${p.id}')">
                                <span id="disp-${p.id}">00:00</span>
                            </div>
                            <div class="controls" style="display:flex; gap:6px">
                                <button class="icon-btn btn-pip" title="Flutuar" onclick="requestPiP('${p.id}')"><span class="material-icons" style="font-size:1.2rem">picture_in_picture_alt</span></button>
                                <button class="icon-btn ${isRunning ? 'btn-pause' : 'btn-play'}" onclick="toggleTimer('${p.id}')"><span class="material-icons">${isRunning ? 'pause' : 'play_arrow'}</span></button>
                                <button class="icon-btn" style="background:transparent; border:1px solid var(--border-color); color:var(--text-color)" onclick="confirmResetPart('${p.id}')"><span class="material-icons">refresh</span></button>
                            </div>
                        </div>
                    </div>
                </div>`;
            updateDisplay(p.id);
        });
        updateTotals();
    }

    async function requestPiP(id) {
        const video = document.getElementById('pipVideo');
        const canvas = document.getElementById('pipCanvas');
        const audio = document.getElementById('silentAudio');
        if (!document.pictureInPictureEnabled) return;
        currentActiveId = id;
        pipSessionActive = true;
        audio.play().catch(() => {});
        updatePiPCanvas();
        video.srcObject = canvas.captureStream(10);
        video.onloadedmetadata = async () => { try { await video.play(); await video.requestPictureInPicture(); setupMediaSession(); } catch (err) {} };
    }

    function setupMediaSession() {
        if ('mediaSession' in navigator) {
            navigator.mediaSession.setActionHandler('play', () => { if(currentActiveId) toggleTimer(currentActiveId); });
            navigator.mediaSession.setActionHandler('pause', () => { if(currentActiveId) toggleTimer(currentActiveId); });
            updateMediaMetadata();
        }
    }

    function updateMediaMetadata() {
        if ('mediaSession' in navigator && currentActiveId) {
            const p = meetingParts.find(x => x.id === currentActiveId);
            navigator.mediaSession.metadata = new MediaMetadata({
                title: p.nome,
                artist: 'Timer para Reuniões',
                artwork: [{ src: 'https://cdn.jsdelivr.net/gh/felipesenajw/meeting-timer-web@main/icon.png', sizes: '512x512', type: 'image/png' }]
            });
            navigator.mediaSession.playbackState = timers[currentActiveId].running ? 'playing' : 'paused';
        }
    }

    function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
        const words = text.split(' ');
        let line = '';
        let currentY = y;
        for (let n = 0; n < words.length; n++) {
            let testLine = line + words[n] + ' ';
            let metrics = ctx.measureText(testLine);
            let testWidth = metrics.width;
            if (testWidth > maxWidth && n > 0) {
                ctx.fillText(line, x, currentY);
                line = words[n] + ' ';
                currentY += lineHeight;
            } else {
                line = testLine;
            }
        }
        ctx.fillText(line, x, currentY);
        return currentY;
    }

    function updatePiPCanvas() {
        if (!pipSessionActive || !currentActiveId) return;
        const canvas = document.getElementById('pipCanvas');
        const ctx = canvas.getContext('2d');
        const p = meetingParts.find(x => x.id === currentActiveId);
        const sec = timers[currentActiveId].sec;
        const metaSec = p.meta * 60;
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        ctx.fillStyle = isDark ? "#1a1a1a" : "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = isDark ? "#bbbbbb" : "#666666";
        ctx.font = "bold 18px Ubuntu, sans-serif";
        ctx.textAlign = "center";
        const lastY = wrapText(ctx, p.nome.toUpperCase(), canvas.width / 2, 35, 260, 22);
        ctx.fillStyle = (sec >= metaSec) ? "#dc3545" : (isDark ? "#ffffff" : "#2d3436");
        ctx.font = "bold 75px Ubuntu, sans-serif";
        ctx.fillText(formatTime(sec), canvas.width / 2, lastY + 80);
    }

    function toggleTimer(id) {
        const state = !timers[id].running;
        if(state) {
            Object.keys(timers).forEach(k => timers[k].running = false);
            requestWakeLock();
            if(pipSessionActive) currentActiveId = id; 
        }
        timers[id].running = state;
        save(); render();
        if(pipSessionActive) { updateMediaMetadata(); updatePiPCanvas(); }
    }

    function formatTime(s) { return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }

    function updateDisplay(id) {
        const p = meetingParts.find(x => x.id === id);
        if(!p) return;
        const sec = timers[id].sec; const metaSec = p.meta * 60;
        const el = document.getElementById(`disp-${id}`);
        const card = document.getElementById(`card-${id}`);
        const prog = document.getElementById(`prog-${id}`);
        if(el) el.innerText = formatTime(sec);
        if(card && prog) {
            const perc = Math.min((sec / metaSec) * 100, 100); prog.style.width = perc + "%";
            card.classList.remove('card-warning', 'card-danger'); prog.classList.remove('progress-warning', 'progress-over'); el.classList.remove('text-danger');
            if(sec >= metaSec) { card.classList.add('card-danger'); prog.classList.add('progress-over'); el.classList.add('text-danger'); }
            else if (metaSec - sec <= 60 && p.id !== 'fixed_inicio') { card.classList.add('card-warning'); prog.classList.add('progress-warning'); }
        }
        if(currentActiveId === id) updatePiPCanvas();
    }

    function updateTotals() {
        let sM = 0, sF = 0, metaM = 0, metaF = 0, saldoM = 0, saldoF = 0;
        meetingParts.forEach(p => {
            const s = timers[p.id].sec || 0; const metaSec = p.meta * 60;
            if(p.container === 'list-fim') { sF += s; metaF += metaSec; if(s > 0) saldoF += (s - metaSec); }
            else { sM += s; metaM += metaSec; if(s > 0) saldoM += (s - metaSec); }
        });
        document.getElementById('total-meio').innerText = formatTime(sM); document.getElementById('total-fim').innerText = formatTime(sF);
        const apply = (aba, total, saldo) => {
            const input = document.getElementById(`start-${aba}`); const display = document.getElementById(`end-${aba}`);
            if(!input.value) return display.innerText = "Término previsto: --:--";
            const [h, m] = input.value.split(':').map(Number);
            const final = (h * 60) + m + (total / 60) + (saldo / 60);
            display.innerText = `Término previsto: ${Math.floor(final / 60) % 24}:${Math.round(final % 60).toString().padStart(2,'0')}`;
        };
        apply('meio', metaM, saldoM); apply('fim', metaF, saldoF);
    }

    function toggleTheme() { const n = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'; document.documentElement.setAttribute('data-theme', n); localStorage.setItem('jw_user_theme', n); if(pipSessionActive) updatePiPCanvas(); }
    function switchTab(t) { document.querySelectorAll('.content, .tab').forEach(e => e.classList.remove('active')); document.getElementById(t).classList.add('active'); document.getElementById(`tab-btn-${t}`).classList.add('active'); }
    function toggleAcc(id, el) { const c = document.getElementById(id + '-wrap'); c.classList.toggle('open'); el.querySelector('.material-icons').innerText = c.classList.contains('open') ? 'expand_less' : 'expand_more'; }
    function saveName(id, val) { participants[id] = val; save(); }
    function toggleConfig() { const isConfig = document.getElementById('body').classList.toggle('config-mode'); document.getElementById('config-icon').innerText = isConfig ? 'check_circle' : 'tune'; document.getElementById('btn-config-nav').classList.toggle('active-mode', isConfig); render(); }
    
    function openModal(title, body, confirmFn, showCancel = true) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalBody').innerHTML = body;
        const cancelBtn = document.getElementById('modalCancelBtn');
        cancelBtn.style.display = showCancel ? 'block' : 'none';
        document.getElementById('modalConfirmBtn').innerText = showCancel ? "Confirmar" : "OK";
        document.getElementById('modalConfirmBtn').onclick = () => { if(confirmFn) confirmFn(); closeModal(); };
        document.getElementById('customModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('customModal').style.display = 'none'; }

    function openAdjustModal(id) { openModal("Ajustar Tempo", `<input type="number" id="adjM" placeholder="Minutos">`, () => { const v = parseInt(document.getElementById('adjM').value); if(!isNaN(v)){timers[id].sec=v*60; save(); render();} }); }
    function prepareAdd(containerId) { openModal("Nova Parte", `<input type="text" id="newN" placeholder="Nome"><input type="number" id="newM" placeholder="Meta">`, () => { const id="p_"+Date.now(); let cor=containerId.includes('tesouros')?'color-tesouros':(containerId.includes('ministerio')?'color-ministerio':(containerId.includes('vida')?'color-vida-crista':'color-fim')); meetingParts.push({id, nome:document.getElementById('newN').value||"Nova Parte", meta:parseInt(document.getElementById('newM').value)||5, container:containerId, cor}); save(); render(); }); }
    function openEditModal(id) { const p=meetingParts.find(x=>x.id===id); openModal("Editar", `<input type="text" id="editN" value="${p.nome}"><input type="number" id="editM" value="${p.meta}">`, () => { p.nome=document.getElementById('editN').value; p.meta=parseInt(document.getElementById('editM').value); save(); render(); }); }
    function confirmDelete(id) { openModal("Remover?", "Excluir?", () => { meetingParts=meetingParts.filter(x=>x.id!==id); save(); render(); }); }
    function confirmResetPart(id) { openModal("Zerar?", "Reiniciar?", () => { timers[id].sec=0; timers[id].running=false; save(); render(); }); }
    function confirmResetAll(aba) { openModal("Zerar Tudo?", "Reiniciar tempos?", () => { meetingParts.forEach(p=>{ if((aba==='fim'&&p.container==='list-fim')||(aba==='meio'&&p.container!=='list-fim')){timers[p.id].sec=0; timers[p.id].running=false;} }); save(); render(); }); }
    function confirmClearNames(aba) { openModal("Limpar Dados?", "Apagar nomes?", () => { meetingParts.forEach(p=>{ if((aba==='fim'&&p.container==='list-fim')||(aba==='meio'&&p.container!=='list-fim')){ delete participants[p.id]; const d=defaultParts.find(x=>x.id===p.id); if(d) p.nome=d.nome; } }); save(); render(); }); }
    function openHistory() { let b=history.length?"":"Sem registros."; history.slice().reverse().slice(0,10).forEach(h=>{ b+=`<div style="border-bottom:1px solid var(--border-color); padding:5px 0">${h.data}<br>${h.resumo}</div>`; }); openModal("Histórico", b, null, false); }
    
    function sendWhatsApp() {
        let t=`*⏱️ RELATÓRIO DE TEMPO*\n\n`, r="", ok=false;
        [{id:'acc-tesouros',l:'TESOUROS'},{id:'acc-ministerio',l:'MINISTÉRIO'},{id:'acc-vida',l:'VIDA CRISTÃ'},{id:'list-fim',l:'FIM DE SEMANA'}].forEach(c=>{
            const ps=meetingParts.filter(p=>p.container.startsWith(c.id)); let ct="";
            ps.forEach(p=>{ if(timers[p.id].sec > 0){ 
                const pName = participants[p.id] ? `(${participants[p.id]})` : "";
                ct+=`• ${p.nome} ${pName}: *${formatTime(timers[p.id].sec)}*\n`; r+=`${p.nome}:${formatTime(timers[p.id].sec)}|`; ok=true; 
            } });
            if(ct) t+=`*${c.l}*\n${ct}\n`;
        });
        
        if(!ok) {
            openModal("Aviso", "Inicie um cronômetro primeiro!", null, false);
            return;
        }

        history.push({data:new Date().toLocaleString(), resumo:r}); 
        save();
        window.open("https://api.whatsapp.com/send?text="+encodeURIComponent(t));
    }

    setInterval(() => { Object.keys(timers).forEach(id => { if(timers[id].running) { timers[id].sec++; updateDisplay(id); updateTotals(); } }); }, 1000);
    const st = localStorage.getItem('jw_user_theme'); if (st) document.documentElement.setAttribute('data-theme', st);
    render();
</script>
</body>
</html>
