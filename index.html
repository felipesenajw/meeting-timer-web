<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Timer para Reuniões</title>
    
    <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/felipesenajw/meeting-timer-web@main/icon.png">
    <link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/gh/felipesenajw/meeting-timer-web@main/icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#5a3d8d">

    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <style>
        :root {
            --primary-color: #5a3d8d;
            --tesouros: #2a6d7a;
            --ministerio: #b38f00;
            --vida-crista: #9e2a2b;
            --danger-color: #dc3545;
            --success-color: #28a745;
            --bg-color: #f0f2f5;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-color: #2d3436;
            --border-color: rgba(0,0,0,0.08);
            --nav-bg: rgba(255, 255, 255, 0.75);
        }

        [data-theme="dark"] {
            --bg-color: #0a0a0a;
            --card-bg: rgba(35, 35, 35, 0.9);
            --text-color: #e0e0e0;
            --border-color: rgba(255,255,255,0.08);
            --nav-bg: rgba(20, 20, 20, 0.8);
            --primary-color: #bb93ff;
        }

        * { font-family: 'Ubuntu', sans-serif; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 10px 10px 140px 10px; transition: background 0.3s; }

        .container { max-width: 500px; margin: auto; }
        h2 { color: var(--primary-color); text-align: center; font-size: 1.4rem; margin: 20px 0; font-weight: 700; }

        .tabs { 
            display: flex; border-radius: 16px; background: var(--nav-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 5px; gap: 5px; margin-bottom: 25px; position: sticky; top: 10px; z-index: 900; border: 1px solid var(--border-color);
        }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-radius: 12px; font-weight: 600; font-size: 0.85rem; border: none; color: var(--text-color); background: transparent; transition: 0.3s; }
        .tab.active { background: var(--primary-color); color: #ffffff !important; box-shadow: 0 4px 12px rgba(90, 61, 141, 0.2); }

        .content { display: none; }
        .content.active { display: block; }

        .accordion { margin-bottom: 15px; border-radius: 20px; overflow: hidden; border: 1px solid var(--border-color); background: var(--card-bg); }
        .accordion-header { padding: 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; color: white; font-weight: 700; font-size: 0.85rem; }
        .accordion-content { display: none; padding: 12px; }
        .accordion-content.open { display: block; }

        .part-card { 
            background: var(--card-bg); border: 1px solid var(--border-color); padding: 18px; border-radius: 18px; margin-bottom: 12px; 
            border-left: 8px solid #ccc; position: relative; overflow: hidden; transition: transform 0.2s;
        }
        .color-tesouros { border-left-color: var(--tesouros); }
        .color-ministerio { border-left-color: var(--ministerio); }
        .color-vida-crista { border-left-color: var(--vida-crista); }
        .color-fim { border-left-color: var(--primary-color); }

        .progress-bar { position: absolute; top: 0; left: 0; height: 4px; background: var(--success-color); width: 0%; transition: width 1s linear; }
        .progress-over { background: var(--danger-color); }

        .status-dot { width: 8px; height: 8px; background: var(--success-color); border-radius: 50%; display: none; margin-left: 8px; }
        .running .status-dot { display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .participant-input { width: 100%; border: 1px solid transparent; border-radius: 10px; background: rgba(0,0,0,0.04); color: var(--text-color); font-size: 0.95rem; margin-top: 8px; padding: 10px 12px; outline: none; }
        [data-theme="dark"] .participant-input { background: rgba(255,255,255,0.05); }

        .timer-row { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .timer-display { font-size: 2.2rem; font-weight: 700; letter-spacing: -1px; cursor: pointer; }

        .icon-btn { border: none; width: 48px; height: 48px; border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; }
        .btn-play { background: var(--primary-color); }
        .btn-pause { background: var(--danger-color); }

        .btn-config-action { width: 32px; height: 32px; border-radius: 10px; border: none; color: white; position: absolute; display: none; align-items: center; justify-content: center; z-index: 10; }
        .btn-delete { background: #333; top: 10px; right: 10px; }
        .btn-edit { background: var(--primary-color); top: 10px; right: 48px; }
        .config-mode .btn-config-action { display: flex; }
        .drag-handle { display: none; align-items: center; gap: 5px; font-size: 0.75rem; background: var(--primary-color); color: white; padding: 6px 12px; border-radius: 10px; margin-bottom: 12px; cursor: grab; width: fit-content; }
        .config-mode .drag-handle { display: flex; }
        .btn-add-part { width: 100%; padding: 14px; background: transparent; border: 2px dashed var(--border-color); color: var(--text-color); border-radius: 16px; font-weight: 700; cursor: pointer; display: none; align-items: center; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .config-mode .btn-add-part { display: flex; }

        .total-box { text-align: center; padding: 25px; background: var(--card-bg); border-radius: 24px; border: 1px solid var(--border-color); margin-top: 25px; }
        .action-area { margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-footer-action { background: transparent; border: 1px solid var(--border-color); color: var(--text-color); padding: 14px; border-radius: 16px; font-weight: 700; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-danger-outline { border-color: var(--danger-color); color: var(--danger-color); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--nav-bg); backdrop-filter: blur(15px); border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; padding: 15px 0 35px 0; z-index: 1000; border-radius: 24px 24px 0 0; }
        .nav-item { background: none; border: none; color: var(--text-color); cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; font-weight: 500; gap: 4px; }
        .nav-item.active-mode { color: var(--success-color); font-weight: 700; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 9999; justify-content: center; align-items: center; padding: 20px; }
        .modal { background: var(--card-bg); color: var(--text-color); padding: 25px; border-radius: 24px; width: 100%; max-width: 360px; border: 1px solid var(--border-color); }
        .modal-footer { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body id="body">

<div class="container">
    <h2>Timer para Reuniões</h2>

    <div class="tabs">
        <button class="tab active" id="tab-btn-meio" onclick="switchTab('meio')">Meio de Semana</button>
        <button class="tab" id="tab-btn-fim" onclick="switchTab('fim')">Fim de Semana</button>
    </div>

    <div id="meio" class="content active">
        <div class="accordion">
            <div class="accordion-header" style="background-color:var(--tesouros)" onclick="toggleAcc('acc-tesouros', this)">TESOUROS DA PALAVRA <span class="material-icons">expand_more</span></div>
            <div id="acc-tesouros-wrap" class="accordion-content">
                <div id="acc-tesouros" class="sortable-list"></div>
                <button class="btn-add-part" onclick="prepareAdd('acc-tesouros')"><span class="material-icons">add_circle</span> Nova Parte</button>
            </div>
        </div>
        <div class="accordion">
            <div class="accordion-header" style="background-color:var(--ministerio)" onclick="toggleAcc('acc-ministerio', this)">FAÇA SEU MELHOR <span class="material-icons">expand_more</span></div>
            <div id="acc-ministerio-wrap" class="accordion-content">
                <div id="acc-ministerio" class="sortable-list"></div>
                <button class="btn-add-part" onclick="prepareAdd('acc-ministerio')"><span class="material-icons">add_circle</span> Nova Parte</button>
            </div>
        </div>
        <div class="accordion">
            <div class="accordion-header" style="background-color:var(--vida-crista)" onclick="toggleAcc('acc-vida', this)">NOSSA VIDA CRISTÃ <span class="material-icons">expand_more</span></div>
            <div id="acc-vida-wrap" class="accordion-content">
                <div id="acc-vida" class="sortable-list"></div>
                <button class="btn-add-part" onclick="prepareAdd('acc-vida')"><span class="material-icons">add_circle</span> Nova Parte</button>
            </div>
        </div>
        
        <div class="total-box">
            <div style="font-size:0.7rem; font-weight:700; opacity:0.6; margin-bottom:5px">TEMPO TOTAL REUNIÃO</div>
            <span id="total-meio" style="font-size:3.5rem; font-weight:800; color:var(--primary-color)">00:00</span>
        </div>
        <div class="action-area">
            <button class="btn-footer-action btn-danger-outline" onclick="confirmResetAll('meio')"><span class="material-icons">timer_off</span> Zerar Tempo</button>
            <button class="btn-footer-action" onclick="confirmClearNames('meio')"><span class="material-icons">cleaning_services</span> Limpar Dados</button>
        </div>
    </div>

    <div id="fim" class="content">
        <div id="list-fim" class="sortable-list"></div>
        <button class="btn-add-part" onclick="prepareAdd('list-fim')"><span class="material-icons">add_circle</span> Nova Parte</button>
        
        <div class="total-box">
            <div style="font-size:0.7rem; font-weight:700; opacity:0.6; margin-bottom:5px">TEMPO TOTAL</div>
            <span id="total-fim" style="font-size:3.5rem; font-weight:800; color:var(--primary-color)">00:00</span>
        </div>
        <div class="action-area">
            <button class="btn-footer-action btn-danger-outline" onclick="confirmResetAll('fim')"><span class="material-icons">timer_off</span> Zerar Tempo</button>
            <button class="btn-footer-action" onclick="confirmClearNames('fim')"><span class="material-icons">cleaning_services</span> Limpar Dados</button>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <button class="nav-item" onclick="openHistory()"><span class="material-icons">history</span>Histórico</button>
    <button class="nav-item" onclick="toggleTheme()"><span class="material-icons">brightness_medium</span>Tema</button>
    <button class="nav-item" onclick="toggleConfig()" id="btn-config-nav"><span class="material-icons" id="config-icon">tune</span> Ajustar</button>
    <button class="nav-item" onclick="sendWhatsApp()" style="color:var(--success-color)"><span class="material-icons">share</span>Enviar</button>
</nav>

<div id="customModal" class="modal-overlay" onclick="if(event.target == this) closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
        <h3 id="modalTitle" style="margin-top:0">Aviso</h3>
        <div id="modalBody"></div>
        <div class="modal-footer">
            <button class="modal-btn" id="modalCancelBtn" onclick="closeModal()" style="background:var(--border-color); color:var(--text-color)">Cancelar</button>
            <button class="modal-btn" style="background:var(--primary-color); color:white" id="modalConfirmBtn">Confirmar</button>
        </div>
    </div>
</div>

<script>
    function initTheme() {
        const savedTheme = localStorage.getItem('jw_user_theme');
        if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
        else if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.setAttribute('data-theme', 'dark');
    }
    initTheme();

    const defaultParts = [
        { id: "p1", nome: "Tesouros da Palavra", meta: 10, container: "acc-tesouros", cor: "color-tesouros" },
        { id: "p2", nome: "Joias Espirituais", meta: 10, container: "acc-tesouros", cor: "color-tesouros" },
        { id: "p3", nome: "Leitura da Bíblia", meta: 4, container: "acc-tesouros", cor: "color-tesouros" },
        { id: "p4", nome: "Parte 1", meta: 5, container: "acc-ministerio", cor: "color-ministerio" },
        { id: "p5", nome: "Parte 2", meta: 5, container: "acc-ministerio", cor: "color-ministerio" },
        { id: "p6", nome: "Parte 3", meta: 5, container: "acc-ministerio", cor: "color-ministerio" },
        { id: "p7", nome: "Parte 1", meta: 15, container: "acc-vida", cor: "color-vida-crista" },
        { id: "p8", nome: "Estudo Bíblico", meta: 30, container: "acc-vida", cor: "color-vida-crista" },
        { id: "p9", nome: "Discurso Público", meta: 30, container: "list-fim", cor: "color-fim" },
        { id: "p10", nome: "Estudo de A Sentinela", meta: 60, container: "list-fim", cor: "color-fim" }
    ];

    let meetingParts = JSON.parse(localStorage.getItem('jw_parts_v47')) || [...defaultParts];
    let timers = JSON.parse(localStorage.getItem('jw_timers_v47')) || {};
    let participants = JSON.parse(localStorage.getItem('jw_names_v47')) || {};
    let history = JSON.parse(localStorage.getItem('jw_history_v47')) || [];
    let currentTab = 'meio';

    function render() {
        const isConfig = document.getElementById('body').classList.contains('config-mode');
        document.querySelectorAll('.sortable-list').forEach(c => {
            c.innerHTML = "";
            new Sortable(c, {
                animation: 300, handle: '.drag-handle', ghostClass: 'sortable-ghost',
                disabled: !isConfig,
                onEnd: () => {
                    const newOrder = [];
                    document.querySelectorAll('.part-card').forEach(card => {
                        const id = card.id.replace('card-', '');
                        const part = meetingParts.find(p => p.id === id);
                        if(part) newOrder.push(part);
                    });
                    meetingParts = [...newOrder]; save();
                }
            });
        });

        meetingParts.forEach(p => {
            if (!timers[p.id]) timers[p.id] = { sec: 0, running: false };
            const container = document.getElementById(p.container);
            if(!container) return;
            const isRunning = timers[p.id].running;
            container.innerHTML += `
                <div class="part-card ${p.cor} ${isRunning ? 'running' : ''}" id="card-${p.id}">
                    <div class="progress-bar" id="prog-${p.id}"></div>
                    <button class="btn-config-action btn-delete" onclick="confirmDelete('${p.id}')"><span class="material-icons" style="font-size:18px">delete</span></button>
                    <button class="btn-config-action btn-edit" onclick="openEditModal('${p.id}')"><span class="material-icons" style="font-size:18px">edit</span></button>
                    <div class="drag-handle"><span class="material-icons" style="font-size:14px">drag_indicator</span> Arrastar</div>
                    <div class="main-content">
                        <div style="font-weight:700; font-size:0.75rem; opacity:0.6; display:flex; align-items:center">
                            ${p.nome} (${p.meta} min) <span class="status-dot"></span>
                        </div>
                        <input type="text" class="participant-input" placeholder="Participante..." value="${participants[p.id] || ''}" oninput="saveName('${p.id}', this.value)">
                        <div class="timer-row">
                            <div class="timer-display" onclick="openAdjustModal('${p.id}')">
                                <span id="disp-${p.id}">00:00</span>
                            </div>
                            <div class="controls" style="display:flex; gap:8px">
                                <button class="icon-btn ${isRunning ? 'btn-pause' : 'btn-play'}" onclick="toggleTimer('${p.id}')"><span class="material-icons">${isRunning ? 'pause' : 'play_arrow'}</span></button>
                                <button class="icon-btn" style="background:transparent; border:1px solid var(--border-color); color:var(--text-color)" onclick="confirmResetPart('${p.id}')"><span class="material-icons">refresh</span></button>
                            </div>
                        </div>
                    </div>
                </div>`;
            updateDisplay(p.id);
        });
        updateTotals();
    }

    function toggleTheme() {
        const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('jw_user_theme', next);
    }

    function toggleConfig() { 
        const isConfig = document.getElementById('body').classList.toggle('config-mode');
        document.getElementById('config-icon').innerText = isConfig ? 'check_circle' : 'tune';
        document.getElementById('btn-config-nav').classList.toggle('active-mode', isConfig);
        render();
    }

    function switchTab(t) {
        currentTab = t;
        document.querySelectorAll('.content, .tab').forEach(e => e.classList.remove('active'));
        document.getElementById(t).classList.add('active');
        document.getElementById(`tab-btn-${t}`).classList.add('active');
    }

    function toggleAcc(id, el) {
        const content = document.getElementById(id + '-wrap');
        content.classList.toggle('open');
        el.querySelector('.material-icons').innerText = content.classList.contains('open') ? 'expand_less' : 'expand_more';
    }

    function openModal(title, body, confirmFn, showCancel = true) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalBody').innerHTML = body;
        const cancelBtn = document.getElementById('modalCancelBtn');
        cancelBtn.style.display = showCancel ? 'block' : 'none';
        document.getElementById('modalConfirmBtn').innerText = showCancel ? "Confirmar" : "Entendido";
        document.getElementById('modalConfirmBtn').onclick = () => { if(confirmFn) confirmFn(); closeModal(); };
        document.getElementById('customModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('customModal').style.display = 'none'; }

    function saveName(id, val) { participants[id] = val; localStorage.setItem('jw_names_v47', JSON.stringify(participants)); }
    function save() { localStorage.setItem('jw_timers_v47', JSON.stringify(timers)); localStorage.setItem('jw_parts_v47', JSON.stringify(meetingParts)); }

    function updateDisplay(id) {
        const p = meetingParts.find(x => x.id === id);
        if(!p) return;
        const sec = timers[id].sec;
        const el = document.getElementById(`disp-${id}`);
        const prog = document.getElementById(`prog-${id}`);
        if(el) el.innerText = formatTime(sec);
        if(prog) {
            const perc = Math.min((sec / (p.meta * 60)) * 100, 100);
            prog.style.width = perc + "%";
            prog.classList.toggle('progress-over', sec >= p.meta * 60);
        }
    }

    function updateTotals() {
        let sM = 0, sF = 0;
        meetingParts.forEach(p => {
            const s = timers[p.id].sec || 0;
            if(p.container === 'list-fim') sF += s; else sM += s;
        });
        document.getElementById('total-meio').innerText = formatTime(sM);
        document.getElementById('total-fim').innerText = formatTime(sF);
    }
    
    function formatTime(s) { return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }

    function toggleTimer(id) {
        const state = !timers[id].running;
        if(state) Object.keys(timers).forEach(k => timers[k].running = false);
        timers[id].running = state;
        save(); render();
    }

    function openAdjustModal(id) {
        openModal("Ajustar Tempo", `Minutos: <input type="number" id="adjM" placeholder="Ex: 5">`, () => {
            const val = parseInt(document.getElementById('adjM').value);
            if(!isNaN(val)) { timers[id].sec = val * 60; save(); render(); }
        });
    }

    function prepareAdd(containerId) {
        openModal("Nova Parte", `Título: <input type="text" id="newN"> Meta (min): <input type="number" id="newM">`, () => {
            const id = "p_" + Date.now();
            let cor = containerId.includes('tesouros') ? 'color-tesouros' : (containerId.includes('ministerio') ? 'color-ministerio' : (containerId.includes('vida') ? 'color-vida-crista' : 'color-fim'));
            meetingParts.push({ id, nome: document.getElementById('newN').value || "Nova Parte", meta: parseInt(document.getElementById('newM').value) || 5, container: containerId, cor });
            save(); render();
        });
    }

    function openEditModal(id) {
        const p = meetingParts.find(x => x.id === id);
        openModal("Editar Parte", `Nome: <input type="text" id="editN" value="${p.nome}"> Meta: <input type="number" id="editM" value="${p.meta}">`, () => {
            p.nome = document.getElementById('editN').value;
            p.meta = parseInt(document.getElementById('editM').value);
            save(); render();
        });
    }

    function confirmDelete(id) { openModal("Remover?", "Excluir esta parte permanentemente?", () => { meetingParts = meetingParts.filter(p => p.id !== id); save(); render(); }); }
    function confirmResetPart(id) { openModal("Zerar?", "Reiniciar tempo desta parte?", () => { timers[id].sec = 0; timers[id].running = false; save(); render(); }); }
    function confirmResetAll(aba) { openModal("Zerar Tudo?", "Reiniciar todos os tempos desta aba?", () => { meetingParts.forEach(p => { if((aba==='fim' && p.container==='list-fim') || (aba==='meio' && p.container!=='list-fim')) { timers[p.id].sec=0; timers[p.id].running=false; } }); save(); render(); }); }
    function confirmClearNames(aba) { openModal("Limpar Dados?", "Apagar todos os nomes e temas desta aba?", () => { meetingParts.forEach(p => { if((aba==='fim' && p.container==='list-fim') || (aba==='meio' && p.container!=='list-fim')) delete participants[p.id]; }); localStorage.setItem('jw_names_v47', JSON.stringify(participants)); render(); }); }

    function openHistory() {
        let body = history.length ? "" : "<p style='text-align:center; opacity:0.5'>Sem registros.</p>";
        history.slice().reverse().slice(0,10).forEach(h => { body += `<div style="border-bottom:1px solid var(--border-color); padding:10px 0; font-size:0.8rem"><strong>${h.data}</strong><br>${h.resumo}</div>`; });
        openModal("Histórico Recente", `<div style="max-height:250px; overflow-y:auto">${body}</div>`, null, false);
    }

    function sendWhatsApp() {
        let txt = `*⏱️ RELATÓRIO DE TEMPO*\n\n`;
        let resumo = "";
        let temTempo = false;
        meetingParts.forEach(p => {
            if((currentTab === 'fim' && p.container === 'list-fim') || (currentTab === 'meio' && p.container !== 'list-fim')) {
                if(timers[p.id].sec > 0) {
                    txt += `• ${p.nome}: ${formatTime(timers[p.id].sec)}\n`;
                    resumo += `${p.nome}: ${formatTime(timers[p.id].sec)} | `;
                    temTempo = true;
                }
            }
        });
        if(!temTempo) {
            openModal("Aviso", "Inicie algum cronômetro primeiro para poder enviar o relatório!", null, false);
            return;
        }
        history.push({ data: new Date().toLocaleString(), resumo });
        localStorage.setItem('jw_history_v47', JSON.stringify(history));
        window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(txt));
    }

    setInterval(() => {
        Object.keys(timers).forEach(id => {
            if(timers[id].running) {
                timers[id].sec++;
                updateDisplay(id);
                updateTotals();
            }
        });
    }, 1000);

    render();
</script>
