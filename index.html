<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Timer para Reuniões</title>
    
    <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/felipesenajw/meeting-timer-web@main/icon.png">
    <link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/gh/felipesenajw/meeting-timer-web@main/icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#5a3d8d">

    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <style>
        :root {
            --primary-color: #5a3d8d;
            --tesouros: #2a6d7a;
            --ministerio: #b38f00;
            --vida-crista: #9e2a2b;
            --danger-color: #dc3545;
            --success-color: #28a745;
            --bg-color: #f8f9fa;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-color: #2d3436;
            --border-color: rgba(0,0,0,0.1);
            --nav-bg: rgba(255, 255, 255, 0.98);
        }

        [data-theme="dark"] {
            --bg-color: #0f0f0f;
            --card-bg: rgba(35, 35, 35, 0.95);
            --text-color: #f1f2f6;
            --border-color: rgba(255,255,255,0.1);
            --nav-bg: rgba(20, 20, 20, 0.98);
            --primary-color: #bb93ff;
        }

        * { font-family: 'Ubuntu', sans-serif; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body { background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 10px; padding-bottom: 140px; overflow-x: hidden; }

        .container { max-width: 500px; margin: auto; }
        h2 { color: var(--primary-color); text-align: center; font-size: 1.4rem; margin: 15px 0; font-weight: 700; }

        .tabs { display: flex; border-radius: 12px; background: var(--border-color); padding: 4px; gap: 4px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-radius: 8px; font-weight: 500; font-size: 0.85rem; border: none; color: var(--text-color); background: transparent; transition: 0.2s; }
        .tab.active { background: var(--primary-color); color: #ffffff !important; }

        .content { display: none; opacity: 0; transform: translateY(10px); transition: opacity 0.3s ease, transform 0.3s ease; }
        .content.active { display: block; opacity: 1; transform: translateY(0); }

        .accordion { margin-bottom: 12px; border-radius: 15px; overflow: hidden; border: 1px solid var(--border-color); }
        .accordion-header { padding: 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; color: white; font-weight: 700; font-size: 0.8rem; }
        .accordion-content { display: none; padding: 12px; }
        .accordion-content.open { display: block; }

        .part-card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 15px; border-radius: 14px; margin-bottom: 15px; border-left: 6px solid #ccc; position: relative; }
        .progress-bar { position: absolute; top: 0; left: 0; height: 3px; background: var(--primary-color); border-radius: 3px 3px 0 0; opacity: 0.5; }
        .status-led { position: absolute; top: 12px; right: 12px; width: 8px; height: 8px; border-radius: 50%; background: var(--success-color); display: none; box-shadow: 0 0 8px var(--success-color); }
        .running .status-led { display: block; animation: pulseLed 1.5s infinite; }
        @keyframes pulseLed { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .drag-handle { display: none; align-items: center; gap: 8px; margin-bottom: 8px; cursor: grab; padding: 5px; background: var(--bg-color); border-radius: 6px; }
        .config-mode .drag-handle { display: flex; }

        .color-tesouros { border-left-color: var(--tesouros); }
        .color-ministerio { border-left-color: var(--ministerio); }
        .color-vida-crista { border-left-color: var(--vida-crista); }
        .color-fim { border-left-color: var(--primary-color); }

        .participant-input { width: 100%; border: none; border-bottom: 1px solid var(--border-color); background: transparent; color: var(--text-color); font-size: 0.95rem; margin-top: 5px; padding: 8px 0; outline: none; }

        .timer-row { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
        .timer-display { font-size: 2rem; font-weight: 700; }
        .controls { display: flex; gap: 10px; }
        
        .icon-btn { border: none; width: 46px; height: 46px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; transition: 0.1s; }
        .icon-btn:active { transform: scale(0.9); }
        .btn-play { background: var(--primary-color); }
        .btn-pause { background: var(--danger-color); }
        .btn-reset { background: transparent; color: var(--text-color); border: 1px solid var(--border-color); }

        .btn-config-action { width: 34px; height: 34px; position: absolute; display: none; border-radius: 10px; border: none; color: white; align-items: center; justify-content: center; z-index: 10; }
        .btn-delete { background: #333; top: -10px; right: -10px; }
        .btn-edit { background: var(--primary-color); top: -10px; right: 30px; }
        .config-mode .btn-config-action { display: flex; }
        .config-mode .main-content { opacity: 0.2; pointer-events: none; }

        .btn-add-part { 
            width: 100%; padding: 10px; background: transparent; border: 2px dashed var(--border-color); 
            color: var(--text-color); border-radius: 12px; font-weight: 600; font-size: 0.75rem; 
            cursor: pointer; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 8px;
            opacity: 0.7; transition: 0.2s;
        }

        .total-box { margin-top: 25px; padding: 25px; background: var(--card-bg); border-radius: 18px; border: 1px solid var(--border-color); text-align: center; display: flex; flex-direction: column; align-items: center; }
        .total-label { font-size: 0.7rem; font-weight: 700; opacity: 0.6; text-transform: uppercase; margin-bottom: 8px; }
        .total-value { font-size: 2.8rem; font-weight: 700; color: var(--primary-color); letter-spacing: -2px; line-height: 1; }
        
        .btn-reset-all { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--danger-color); color: var(--danger-color); border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 20px; }
        .btn-clear-names { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--border-color); color: var(--text-color); opacity: 0.5; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 15px; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--nav-bg); border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; padding: 12px 0; z-index: 2000; border-radius: 20px 20px 0 0; }
        .nav-item { background: none; border: none; color: var(--text-color); cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; }
        .nav-item.active-mode { color: var(--success-color); font-weight: 700; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; padding: 20px; }
        .modal { background: var(--card-bg); color: var(--text-color); padding: 25px; border-radius: 20px; width: 100%; max-width: 350px; border: 1px solid var(--border-color); }
        .modal input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-color); color: var(--text-color); }
        .modal-footer { display: flex; gap: 10px; margin-top: 15px; }
        .modal-btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; }

        .alert-danger { background: rgba(220, 53, 69, 0.1) !important; border-color: var(--danger-color); }
    </style>
</head>
<body id="body">

<div class="container">
    <h2>Timer para Reuniões</h2>

    <div class="tabs">
        <button class="tab active" id="tab-btn-meio" onclick="switchTab('meio')">Meio de Semana</button>
        <button class="tab" id="tab-btn-fim" onclick="switchTab('fim')">Fim de Semana</button>
    </div>

    <div id="meio" class="content active">
        <div class="accordion">
            <div class="accordion-header" style="background-color:var(--tesouros)" onclick="toggleAcc('acc-tesouros', this)">TESOUROS DA PALAVRA <span class="material-icons">expand_more</span></div>
            <div id="acc-tesouros-wrap" class="accordion-content">
                <div id="acc-tesouros" class="sortable-list" data-container="acc-tesouros"></div>
                <button class="btn-add-part" onclick="prepareAdd('acc-tesouros')"><span class="material-icons">add</span> Adicionar Parte</button>
            </div>
        </div>
        <div class="accordion">
            <div class="accordion-header" style="background-color:var(--ministerio)" onclick="toggleAcc('acc-ministerio', this)">FAÇA SEU MELHOR <span class="material-icons">expand_more</span></div>
            <div id="acc-ministerio-wrap" class="accordion-content">
                <div id="acc-ministerio" class="sortable-list" data-container="acc-ministerio"></div>
                <button class="btn-add-part" onclick="prepareAdd('acc-ministerio')"><span class="material-icons">add</span> Adicionar Parte</button>
            </div>
        </div>
        <div class="accordion">
            <div class="accordion-header" style="background-color:var(--vida-crista)" onclick="toggleAcc('acc-vida', this)">NOSSA VIDA CRISTÃ <span class="material-icons">expand_more</span></div>
            <div id="acc-vida-wrap" class="accordion-content">
                <div id="acc-vida" class="sortable-list" data-container="acc-vida"></div>
                <button class="btn-add-part" onclick="prepareAdd('acc-vida')"><span class="material-icons">add</span> Adicionar Parte</button>
            </div>
        </div>
        <div class="total-box">
            <span class="total-label">Tempo Total da Reunião</span>
            <span class="total-value" id="total-meio">00:00</span>
            <button class="btn-reset-all" onclick="confirmResetAll('meio')">Zerar Cronômetros</button>
        </div>
        <button class="btn-clear-names" onclick="confirmResetTabContent('meio')">Resetar Aba (Nomes e Temas)</button>
    </div>

    <div id="fim" class="content">
        <div id="list-fim" class="sortable-list" data-container="list-fim"></div>
        <button class="btn-add-part" onclick="prepareAdd('list-fim')"><span class="material-icons">add</span> Adicionar Parte</button>
        <div class="total-box">
            <span class="total-label">Tempo Total da Reunião</span>
            <span class="total-value" id="total-fim">00:00</span>
            <button class="btn-reset-all" onclick="confirmResetAll('fim')">Zerar Cronômetros</button>
        </div>
        <button class="btn-clear-names" onclick="confirmResetTabContent('fim')">Resetar Aba (Nomes e Temas)</button>
    </div>
</div>

<nav class="bottom-nav">
    <button class="nav-item" onclick="openHistory()"><span class="material-icons">history</span>Histórico</button>
    <button class="nav-item" onclick="toggleTheme()"><span class="material-icons" id="theme-icon">brightness_6</span>Tema</button>
    <button class="nav-item" onclick="toggleConfig()" id="btn-config-nav">
        <span class="material-icons" id="config-icon">tune</span>
        <span id="config-label">Ajustar</span>
    </button>
    <button class="nav-item" onclick="sendWhatsApp()" style="color:var(--success-color)"><span class="material-icons">share</span>Enviar</button>
</nav>

<div id="customModal" class="modal-overlay">
    <div class="modal">
        <h3 id="modalTitle" style="margin-top:0">Aviso</h3>
        <div id="modalBody" style="font-size:0.9rem"></div>
        <div class="modal-footer">
            <button class="modal-btn" id="modalCancelBtn" onclick="closeModal()" style="background:#eee; color:#333">Cancelar</button>
            <button class="modal-btn" style="background:var(--primary-color); color:white" id="modalConfirmBtn">Confirmar</button>
        </div>
    </div>
</div>

<script>
    // Inicialização do Tema Inteligente
    function initTheme() {
        const savedTheme = localStorage.getItem('jw_user_theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
        } else if (systemPrefersDark) {
            document.documentElement.setAttribute('data-theme', 'dark');
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    }
    initTheme();

    const defaultParts = [
        { id: "p1", nome: "Tesouros da Palavra", meta: 10, container: "acc-tesouros", cor: "color-tesouros" },
        { id: "p2", nome: "Joias Espirituais", meta: 10, container: "acc-tesouros", cor: "color-tesouros" },
        { id: "p3", nome: "Leitura da Bíblia", meta: 4, container: "acc-tesouros", cor: "color-tesouros" },
        { id: "p4", nome: "Parte 1", meta: 5, container: "acc-ministerio", cor: "color-ministerio" },
        { id: "p5", nome: "Parte 2", meta: 5, container: "acc-ministerio", cor: "color-ministerio" },
        { id: "p6", nome: "Parte 3", meta: 5, container: "acc-ministerio", cor: "color-ministerio" },
        { id: "p7", nome: "Parte 1", meta: 15, container: "acc-vida", cor: "color-vida-crista" },
        { id: "p8", nome: "Estudo Bíblico", meta: 30, container: "acc-vida", cor: "color-vida-crista" },
        { id: "p9", nome: "Discurso Público", meta: 30, container: "list-fim", cor: "color-fim" },
        { id: "p10", nome: "Estudo de A Sentinela", meta: 60, container: "list-fim", cor: "color-fim" }
    ];

    let meetingParts = JSON.parse(localStorage.getItem('jw_parts_v39')) || [...defaultParts];
    let timers = JSON.parse(localStorage.getItem('jw_timers_v39')) || {};
    let participants = JSON.parse(localStorage.getItem('jw_names_v39')) || {};
    let history = JSON.parse(localStorage.getItem('jw_history_v39')) || [];
    let currentTab = 'meio';

    function render() {
        document.querySelectorAll('.sortable-list').forEach(c => {
            c.innerHTML = "";
            new Sortable(c, {
                animation: 200, handle: '.drag-handle',
                disabled: !document.getElementById('body').classList.contains('config-mode'),
                onEnd: () => {
                    const newOrder = [];
                    document.querySelectorAll('.part-card').forEach(card => {
                        const id = card.id.replace('card-', '');
                        const part = meetingParts.find(p => p.id === id);
                        if(part) newOrder.push(part);
                    });
                    meetingParts = [...newOrder];
                    save();
                }
            });
        });

        meetingParts.forEach(p => {
            if (!timers[p.id]) timers[p.id] = { sec: 0, running: false };
            const container = document.getElementById(p.container);
            if(!container) return;
            const isRunning = timers[p.id].running;
            container.innerHTML += `
                <div class="part-card ${p.cor} ${isRunning ? 'running' : ''}" id="card-${p.id}">
                    <div class="progress-bar" id="prog-${p.id}"></div>
                    <div class="status-led"></div>
                    <button class="btn-config-action btn-delete" onclick="confirmDelete('${p.id}')"><span class="material-icons">delete</span></button>
                    <button class="btn-config-action btn-edit" onclick="openEditModal('${p.id}')"><span class="material-icons">edit</span></button>
                    <div class="drag-handle"><span class="material-icons">drag_indicator</span><span style="font-size:0.8rem"> Mover: ${p.nome}</span></div>
                    <div class="main-content">
                        <div style="font-weight:700; font-size:0.8rem; opacity:0.6">${p.nome} (${p.meta} min)</div>
                        <input type="text" class="participant-input" placeholder="Participante..." value="${participants[p.id] || ''}" oninput="saveName('${p.id}', this.value)">
                        <div class="timer-row">
                            <div class="timer-display" onclick="openAdjustModal('${p.id}')" id="disp-${p.id}">00:00</div>
                            <div class="controls">
                                <button class="icon-btn ${isRunning ? 'btn-pause' : 'btn-play'}" onclick="toggleTimer('${p.id}')"><span class="material-icons">${isRunning ? 'pause' : 'play_arrow'}</span></button>
                                <button class="icon-btn btn-reset" onclick="confirmResetPart('${p.id}')"><span class="material-icons">refresh</span></button>
                            </div>
                        </div>
                    </div>
                </div>`;
            updateDisplay(p.id);
        });
        updateTotals();
    }

    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('jw_user_theme', next);
    }

    function prepareAdd(containerId) {
        let cor = "color-fim";
        if(containerId === 'acc-tesouros') cor = "color-tesouros";
        if(containerId === 'acc-ministerio') cor = "color-ministerio";
        if(containerId === 'acc-vida') cor = "color-vida-crista";

        openModal("Nova Parte", `
            Título: <input type="text" id="newN" placeholder="Ex: Necessidades Locais">
            Meta (min): <input type="number" id="newM" placeholder="Ex: 15">
        `, () => {
            const id = "p_" + Date.now();
            const nome = document.getElementById('newN').value || "Nova Parte";
            const meta = parseInt(document.getElementById('newM').value) || 5;
            meetingParts.push({ id, nome, meta, container: containerId, cor });
            save(); render();
        });
    }

    function toggleTimer(id) {
        const state = !timers[id].running;
        if(state) Object.keys(timers).forEach(k => timers[k].running = false);
        timers[id].running = state;
        save(); render();
    }

    function saveName(id, val) { participants[id] = val; localStorage.setItem('jw_names_v39', JSON.stringify(participants)); }
    function save() { localStorage.setItem('jw_timers_v39', JSON.stringify(timers)); localStorage.setItem('jw_parts_v39', JSON.stringify(meetingParts)); }

    function updateDisplay(id) {
        const p = meetingParts.find(x => x.id === id);
        if(!p) return;
        const sec = timers[id].sec;
        const el = document.getElementById(`disp-${id}`);
        const prog = document.getElementById(`prog-${id}`);
        const card = document.getElementById(`card-${id}`);
        if(el) el.innerText = formatTime(sec);
        if(prog) prog.style.width = Math.min((sec / (p.meta * 60)) * 100, 100) + "%";
        if(card) card.classList.toggle('alert-danger', sec >= p.meta * 60);
    }

    function updateTotals() {
        let sM = 0, sF = 0;
        meetingParts.forEach(p => {
            const s = timers[p.id].sec;
            if(p.container === 'list-fim') sF += s; else sM += s;
        });
        if(document.getElementById('total-meio')) document.getElementById('total-meio').innerText = formatTime(sM);
        if(document.getElementById('total-fim')) document.getElementById('total-fim').innerText = formatTime(sF);
    }
    
    function formatTime(s) { return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }

    function toggleAcc(id, el) {
        const content = document.getElementById(id + '-wrap');
        const icon = el.querySelector('.material-icons');
        content.classList.toggle('open');
        icon.innerText = content.classList.contains('open') ? 'expand_less' : 'expand_more';
    }

    function switchTab(t) {
        currentTab = t;
        document.querySelectorAll('.content, .tab').forEach(e => e.classList.remove('active'));
        document.getElementById(t).classList.add('active');
        document.getElementById(`tab-btn-${t}`).classList.add('active');
    }

    function toggleConfig() { 
        document.getElementById('body').classList.toggle('config-mode'); 
        const isConfig = document.getElementById('body').classList.contains('config-mode');
        document.getElementById('config-icon').innerText = isConfig ? 'check_circle' : 'tune';
        document.getElementById('config-label').innerText = isConfig ? 'Confirmar' : 'Ajustar';
        document.getElementById('btn-config-nav').classList.toggle('active-mode', isConfig);
        render();
    }

    function openModal(title, body, confirmFn, showCancel = true) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalBody').innerHTML = body;
        document.getElementById('modalCancelBtn').style.display = showCancel ? 'block' : 'none';
        document.getElementById('modalConfirmBtn').onclick = () => { confirmFn(); closeModal(); };
        document.getElementById('customModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('customModal').style.display = 'none'; }

    function confirmDelete(id) { openModal("Remover?", "Excluir esta parte?", () => { meetingParts = meetingParts.filter(p => p.id !== id); save(); render(); }); }
    function openEditModal(id) {
        const p = meetingParts.find(x => x.id === id);
        openModal("Editar Parte", `Nome: <input type="text" id="editN" value="${p.nome}"> Meta: <input type="number" id="editM" value="${p.meta}">`, () => {
            p.nome = document.getElementById('editN').value; p.meta = parseInt(document.getElementById('editM').value); save(); render();
        });
    }

    function confirmResetPart(id) { openModal("Zerar?", "Reiniciar tempo desta parte?", () => { timers[id].sec = 0; timers[id].running = false; save(); render(); }); }
    function confirmResetAll(aba) { openModal("Zerar Tudo?", "Reiniciar todos os tempos desta aba?", () => { meetingParts.forEach(p => { if((aba==='fim' && p.container==='list-fim') || (aba==='meio' && p.container!=='list-fim')) { timers[p.id].sec=0; timers[p.id].running=false; } }); save(); render(); }); }

    function confirmResetTabContent(aba) {
        openModal("Resetar Aba?", "Limpar nomes e voltar temas ao padrão?", () => {
            meetingParts.forEach(p => {
                if((aba === 'fim' && p.container === 'list-fim') || (aba === 'meio' && p.container !== 'list-fim')) {
                    participants[p.id] = "";
                    const original = defaultParts.find(dp => dp.id === p.id);
                    if(original) { p.nome = original.nome; p.meta = original.meta; }
                }
            });
            save(); render();
        });
    }

    function openAdjustModal(id) { openModal("Ajustar", `Minutos: <input type="number" id="adjM" placeholder="Ex: 5">`, () => { timers[id].sec = (parseInt(document.getElementById('adjM').value) || 0) * 60; save(); render(); }); }

    function openHistory() {
        let body = history.length ? "" : "<p style='text-align:center; opacity:0.5'>Sem registros.</p>";
        history.slice().reverse().slice(0,10).forEach(h => { body += `<div style="border-bottom:1px solid var(--border-color); padding:10px 0; font-size:0.8rem"><strong>${h.data}</strong><br>${h.resumo}</div>`; });
        openModal("Histórico Recente", `<div style="max-height:200px; overflow-y:auto">${body}</div>`, () => {}, false);
    }

    setInterval(() => {
        Object.keys(timers).forEach(id => {
            if(timers[id].running) {
                timers[id].sec++;
                updateDisplay(id);
                updateTotals();
                const p = meetingParts.find(x => x.id === id);
                if(p && (timers[id].sec === p.meta * 60 - 60 || timers[id].sec === p.meta * 60)) navigator.vibrate?.(200);
            }
        });
    }, 1000);

    function sendWhatsApp() {
        let txt = `*⏱️ RELATÓRIO DE TEMPO*\n\n`;
        let hasData = false;
        let resumo = "";
        meetingParts.forEach(p => {
            if((currentTab === 'fim' && p.container === 'list-fim') || (currentTab === 'meio' && p.container !== 'list-fim')) {
                if(timers[p.id].sec > 0) {
                    hasData = true;
                    const time = formatTime(timers[p.id].sec);
                    txt += `• ${p.nome}: ${time}\n`;
                    resumo += `${p.nome}: ${time} | `;
                }
            }
        });
        if(!hasData) { openModal("Aviso", "Nenhum tempo registrado para enviar.", () => {}, false); return; }
        const agora = new Date();
        history.push({ data: agora.toLocaleString(), resumo: resumo });
        localStorage.setItem('jw_history_v39', JSON.stringify(history));
        window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(txt));
    }

    render();
</script>
</body>
</html>
