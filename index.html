<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Timer para Reuniões</title>
    
    <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/felipesenajw/meeting-timer-web@main/icon.png">
    <link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/gh/felipesenajw/meeting-timer-web@main/icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#5a3d8d">

    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <style>
        :root {
            --primary-color: #5a3d8d;
            --tesouros: #2a6d7a;
            --ministerio: #b38f00;
            --vida-crista: #9e2a2b;
            --danger-color: #dc3545;
            --warning-color: #ffc107;
            --success-color: #28a745;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #dddddd;
            --nav-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --border-color: #333333;
            --nav-bg: #1e1e1e;
            --primary-color: #a584e0;
        }

        * { font-family: 'Ubuntu', sans-serif; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 10px; padding-bottom: 140px; transition: 0.3s; }
        .container { max-width: 500px; margin: auto; background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        h2 { color: var(--primary-color); text-align: center; font-size: 1.5rem; margin-bottom: 15px; font-weight: 700; }

        .tabs { display: flex; border-radius: 8px; overflow: hidden; margin-bottom: 15px; border: 1px solid var(--primary-color); }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; background: transparent; font-weight: 500; font-size: 0.9rem; border: none; color: var(--text-color); }
        .tab.active { background: var(--primary-color); color: white; }

        .content { display: none; }
        .content.active { display: block; }

        .accordion { margin-bottom: 10px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color); }
        .accordion-header { padding: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; color: white; font-weight: 500; font-size: 0.85rem; }
        .accordion-content { display: none; padding: 10px; background: var(--card-bg); min-height: 20px; }
        .accordion-content.open { display: block; }

        /* Card e Handle */
        .part-card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 12px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid #ccc; position: relative; }
        
        .drag-handle { display: none; align-items: center; gap: 5px; margin-bottom: 5px; color: var(--text-color); opacity: 0.7; }
        .config-mode .drag-handle { display: flex; cursor: grab; }
        .config-mode .part-card { cursor: grab; }

        .color-tesouros { border-left-color: var(--tesouros); }
        .color-ministerio { border-left-color: var(--ministerio); }
        .color-vida-crista { border-left-color: var(--vida-crista); }
        .color-fim { border-left-color: var(--primary-color); }

        .participant-input { width: 100%; border: none; border-bottom: 1px dashed #ccc; background: transparent; color: var(--text-color); font-size: 0.85rem; margin-top: 5px; outline: none; }

        .timer-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .timer-display { font-size: 1.8rem; font-weight: 700; cursor: pointer; }
        .controls { display: flex; gap: 8px; }
        .icon-btn { border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; position: relative; z-index: 10; }
        .btn-play { background: var(--success-color); }
        .btn-pause { background: var(--danger-color); }
        .btn-reset { background: #6c757d; }

        .btn-config-action { width: 36px; height: 36px; position: absolute; display: none; border-radius: 50%; border: none; color: white; cursor: pointer; align-items: center; justify-content: center; z-index: 20; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .btn-delete { background: #333; top: -12px; right: -12px; }
        .btn-edit { background: var(--primary-color); top: -12px; right: 30px; }
        
        .config-mode .btn-config-action { display: flex; }
        .config-mode .timer-row, .config-mode .participant-input { opacity: 0.1; pointer-events: none; }

        .total-box { margin-top: 20px; padding: 15px; background: rgba(90, 61, 141, 0.05); border-radius: 8px; border: 1px dashed var(--primary-color); text-align: center; }
        .total-value { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; display: block; }
        .btn-reset-all { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--danger-color); color: var(--danger-color); border-radius: 8px; font-weight: 700; font-size: 0.75rem; cursor: pointer; text-transform: uppercase; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--nav-bg); border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; }
        .nav-item { background: none; border: none; color: var(--text-color); cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; }
        .modal { background: var(--card-bg); color: var(--text-color); padding: 20px; border-radius: 15px; width: 85%; max-width: 350px; }
        .modal input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-color); color: var(--text-color); }
        .modal-footer { display: flex; gap: 10px; margin-top: 15px; }
        .modal-btn { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; }

        .sortable-ghost { opacity: 0.3; background: var(--primary-color) !important; }
        .alert-danger { background: rgba(220, 53, 69, 0.1); border-color: var(--danger-color); }
        .alert-warning { background: rgba(255, 193, 7, 0.1); border-color: var(--warning-color); }
    </style>
</head>
<body id="body">

<div class="container">
    <h2>Timer para Reuniões</h2>

    <div class="tabs">
        <button class="tab active" id="tab-btn-meio" onclick="switchTab('meio')">Meio de Semana</button>
        <button class="tab" id="tab-btn-fim" onclick="switchTab('fim')">Fim de Semana</button>
    </div>

    <div id="meio" class="content active">
        <div class="accordion">
            <div class="accordion-header" style="background-color:var(--tesouros)" onclick="toggleAcc('acc-tesouros', this)">TESOUROS DA PALAVRA <span class="material-icons">expand_more</span></div>
            <div id="acc-tesouros" class="accordion-content sortable-list" data-container="acc-tesouros"></div>
        </div>
        <div class="accordion">
            <div class="accordion-header" style="background-color:var(--ministerio)" onclick="toggleAcc('acc-ministerio', this)">FAÇA SEU MELHOR <span class="material-icons">expand_more</span></div>
            <div id="acc-ministerio" class="accordion-content sortable-list" data-container="acc-ministerio"></div>
        </div>
        <div class="accordion">
            <div class="accordion-header" style="background-color:var(--vida-crista)" onclick="toggleAcc('acc-vida', this)">NOSSA VIDA CRISTÃ <span class="material-icons">expand_more</span></div>
            <div id="acc-vida" class="accordion-content sortable-list" data-container="acc-vida"></div>
        </div>
        <div class="total-box">
            <span style="font-size: 0.7rem; font-weight:700; color:var(--primary-color)">TOTAL DA REUNIÃO</span>
            <span class="total-value" id="total-meio">00:00</span>
            <button class="btn-reset-all" onclick="confirmResetAll('meio')">Zerar Todos da Aba</button>
        </div>
    </div>

    <div id="fim" class="content">
        <div id="list-fim" class="sortable-list" data-container="list-fim" style="min-height: 50px;"></div>
        <div class="total-box">
            <span style="font-size: 0.7rem; font-weight:700; color:var(--primary-color)">TOTAL DA REUNIÃO</span>
            <span class="total-value" id="total-fim">00:00</span>
            <button class="btn-reset-all" onclick="confirmResetAll('fim')">Zerar Todos da Aba</button>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <button class="nav-item" onclick="openHistory()"><span class="material-icons">history</span>Histórico</button>
    <button class="nav-item" onclick="toggleTheme()"><span class="material-icons">brightness_6</span>Tema</button>
    <button class="nav-item" onclick="toggleConfig()" id="btn-config-nav">
        <span class="material-icons" id="config-icon">settings</span>
        <span id="config-label">Configurar</span>
    </button>
    <button class="nav-item" onclick="sendWhatsApp()" style="color:var(--success-color)"><span class="material-icons">share</span>Compartilhar</button>
</nav>

<div id="customModal" class="modal-overlay">
    <div class="modal">
        <h3 id="modalTitle" style="margin-top:0">Aviso</h3>
        <div id="modalBody"></div>
        <div class="modal-footer">
            <button class="modal-btn" id="modalCancelBtn" style="background:#666; color:white" onclick="closeModal()">Cancelar</button>
            <button class="modal-btn" style="background:var(--primary-color); color:white" id="modalConfirmBtn">Confirmar</button>
        </div>
    </div>
</div>

<script>
    const defaultParts = [
        { id: "p1", nome: "Tesouros da Palavra", meta: 10, container: "acc-tesouros", cor: "color-tesouros", label: "💎 TESOUROS" },
        { id: "p2", nome: "Joias Espirituais", meta: 10, container: "acc-tesouros", cor: "color-tesouros", label: "💎 TESOUROS" },
        { id: "p3", nome: "Leitura da Bíblia", meta: 4, container: "acc-tesouros", cor: "color-tesouros", label: "💎 TESOUROS" },
        { id: "p4", nome: "Parte 1", meta: 5, container: "acc-ministerio", cor: "color-ministerio", label: "🎤 MINISTÉRIO" },
        { id: "p5", nome: "Parte 2", meta: 5, container: "acc-ministerio", cor: "color-ministerio", label: "🎤 MINISTÉRIO" },
        { id: "p6", nome: "Parte 3", meta: 5, container: "acc-ministerio", cor: "color-ministerio", label: "🎤 MINISTÉRIO" },
        { id: "p7", nome: "Parte 1", meta: 15, container: "acc-vida", cor: "color-vida-crista", label: "🌳 VIDA CRISTÃ" },
        { id: "p8", nome: "Estudo Bíblico", meta: 30, container: "acc-vida", cor: "color-vida-crista", label: "🌳 VIDA CRISTÃ" },
        { id: "p9", nome: "Discurso Público", meta: 30, container: "list-fim", cor: "color-fim", label: "📢 FIM DE SEMANA" },
        { id: "p10", nome: "Estudo de A Sentinela", meta: 60, container: "list-fim", cor: "color-fim", label: "📢 FIM DE SEMANA" }
    ];

    let meetingParts = JSON.parse(localStorage.getItem('jw_parts_v29')) || defaultParts;
    let timers = JSON.parse(localStorage.getItem('jw_timers_v29')) || {};
    let participants = JSON.parse(localStorage.getItem('jw_names_v29')) || {};
    let history = JSON.parse(localStorage.getItem('jw_history_v29')) || [];
    let currentTab = 'meio';

    function render() {
        document.querySelectorAll('.sortable-list').forEach(c => {
            c.innerHTML = "";
            new Sortable(c, {
                animation: 150,
                ghostClass: 'sortable-ghost',
                disabled: !document.getElementById('body').classList.contains('config-mode'),
                filter: 'input, button', // Impede arraste ao clicar em inputs ou botões
                onEnd: function() {
                    const newOrder = [];
                    document.querySelectorAll('.part-card').forEach(card => {
                        const id = card.id.replace('card-', '');
                        const part = meetingParts.find(p => p.id === id);
                        if(part) newOrder.push(part);
                    });
                    const missingParts = meetingParts.filter(p => !newOrder.find(no => no.id === p.id));
                    meetingParts = [...newOrder, ...missingParts];
                    save();
                }
            });
        });

        meetingParts.forEach(p => {
            if (!timers[p.id]) timers[p.id] = { sec: 0, running: false };
            const container = document.querySelector(`[data-container="${p.container}"]`);
            if(!container) return;
            container.innerHTML += `
                <div class="part-card ${p.cor}" id="card-${p.id}">
                    <button class="btn-config-action btn-delete" onclick="confirmDelete('${p.id}')"><span class="material-icons">delete</span></button>
                    <button class="btn-config-action btn-edit" onclick="openEditModal('${p.id}')"><span class="material-icons">edit</span></button>
                    
                    <div class="drag-handle">
                        <span class="material-icons">drag_indicator</span>
                        <div style="font-weight:700; font-size: 0.9rem">${p.nome} <span style="font-size:0.7rem; opacity:0.6">(${p.meta} min)</span></div>
                    </div>

                    <div class="main-content">
                        <div class="part-info-static" style="font-weight:700; font-size:0.9rem; margin-bottom:5px; ${document.getElementById('body').classList.contains('config-mode') ? 'display:none' : ''}">
                            ${p.nome} <span style="font-size:0.7rem; opacity:0.6">(${p.meta} min)</span>
                        </div>
                        <input type="text" class="participant-input" placeholder="Participante..." 
                            value="${participants[p.id] || ''}" oninput="saveName('${p.id}', this.value)">
                        <div class="timer-row">
                            <div class="timer-display" onclick="openAdjustModal('${p.id}')" id="disp-${p.id}">00:00</div>
                            <div class="controls">
                                <button class="icon-btn ${timers[p.id].running ? 'btn-pause' : 'btn-play'}" onclick="toggleTimer('${p.id}')">
                                    <span class="material-icons">${timers[p.id].running ? 'pause' : 'play_arrow'}</span>
                                </button>
                                <button class="icon-btn btn-reset" onclick="confirmResetPart('${p.id}')"><span class="material-icons">replay</span></button>
                            </div>
                        </div>
                    </div>
                </div>`;
            updateDisplay(p.id);
        });
        updateTotals();
    }

    function toggleTimer(id) {
        const state = !timers[id].running;
        Object.keys(timers).forEach(k => timers[k].running = false);
        timers[id].running = state;
        save(); render();
    }

    function saveName(id, val) { participants[id] = val; localStorage.setItem('jw_names_v29', JSON.stringify(participants)); }
    function save() { localStorage.setItem('jw_timers_v29', JSON.stringify(timers)); localStorage.setItem('jw_parts_v29', JSON.stringify(meetingParts)); }

    function updateDisplay(id) {
        const p = meetingParts.find(x => x.id === id);
        if(!p) return;
        const sec = timers[id].sec;
        const el = document.getElementById(`disp-${id}`);
        const card = document.getElementById(`card-${id}`);
        if(el) el.innerText = formatTime(sec);
        if(card) {
            card.classList.remove('alert-warning', 'alert-danger');
            if(sec >= p.meta * 60) card.classList.add('alert-danger');
            else if(sec >= (p.meta * 60 - 60) && sec > 0) card.classList.add('alert-warning');
        }
    }

    function updateTotals() {
        let sM = 0, sF = 0;
        meetingParts.forEach(p => {
            const s = timers[p.id].sec;
            if(p.container === 'list-fim') sF += s; else sM += s;
        });
        if(document.getElementById('total-meio')) document.getElementById('total-meio').innerText = formatTime(sM);
        if(document.getElementById('total-fim')) document.getElementById('total-fim').innerText = formatTime(sF);
    }
    
    function formatTime(s) { return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }

    function toggleAcc(id, el) {
        const content = document.getElementById(id);
        const icon = el.querySelector('.material-icons');
        content.classList.toggle('open');
        icon.innerText = content.classList.contains('open') ? 'expand_less' : 'expand_more';
    }

    function switchTab(t) {
        currentTab = t;
        document.querySelectorAll('.content, .tab').forEach(e => e.classList.remove('active'));
        document.getElementById(t).classList.add('active');
        document.getElementById(`tab-btn-${t}`).classList.add('active');
    }

    function toggleConfig() { 
        const body = document.getElementById('body');
        body.classList.toggle('config-mode'); 
        const isConfig = body.classList.contains('config-mode');
        document.getElementById('config-icon').innerText = isConfig ? 'check_circle' : 'settings';
        document.getElementById('config-label').innerText = isConfig ? 'Pronto' : 'Configurar';
        render(); // Re-render para ativar/desativar o Sortable
    }

    function confirmDelete(id) { openModal("Remover?", "Excluir esta parte?", () => { meetingParts = meetingParts.filter(p => p.id !== id); save(); render(); }); }
    function openEditModal(id) {
        const p = meetingParts.find(x => x.id === id);
        openModal("Editar Parte", `Nome: <input type="text" id="editN" value="${p.nome}"> Meta: <input type="number" id="editM" value="${p.meta}">`, () => {
            p.nome = document.getElementById('editN').value;
            p.meta = parseInt(document.getElementById('editM').value);
            save(); render();
        });
    }

    function confirmResetPart(id) { openModal("Zerar?", "Reiniciar cronômetro?", () => { timers[id].sec = 0; timers[id].running = false; save(); render(); }); }
    function confirmResetAll(aba) { openModal("Zerar Aba?", "Zerar todos os tempos desta aba?", () => { meetingParts.forEach(p => { if((aba==='fim' && p.container==='list-fim') || (aba==='meio' && p.container!=='list-fim')) { timers[p.id].sec=0; timers[p.id].running=false; } }); save(); render(); }); }
    function openAdjustModal(id) { openModal("Ajustar", `Minutos: <input type="number" id="adjM">`, () => { timers[id].sec = (parseInt(document.getElementById('adjM').value) || 0) * 60; save(); render(); }); }

    function openModal(title, body, confirmFn, showCancel = true) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalBody').innerHTML = body;
        document.getElementById('modalCancelBtn').style.display = showCancel ? 'block' : 'none';
        document.getElementById('modalConfirmBtn').onclick = () => { confirmFn(); closeModal(); };
        document.getElementById('customModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('customModal').style.display = 'none'; }

    function openHistory() {
        let body = history.length ? "" : "<p>Vazio.</p>";
        history.slice().reverse().forEach(h => { body += `<div style="border-bottom:1px solid #ddd; padding:8px; font-size:0.8rem"><strong>${h.data}</strong><br>${h.resumo}</div>`; });
        openModal("Histórico", `<div style="max-height:250px; overflow-y:auto">${body}</div>`, () => {});
    }

    function toggleTheme() {
        const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
    }

    setInterval(() => {
        Object.keys(timers).forEach(id => {
            if(timers[id].running) {
                timers[id].sec++;
                updateDisplay(id);
                updateTotals();
                const p = meetingParts.find(x => x.id === id);
                if(p && timers[id].sec === p.meta * 60 - 60) navigator.vibrate?.(200);
                if(p && timers[id].sec === p.meta * 60) navigator.vibrate?.([400, 200, 400]);
            }
        });
    }, 1000);

    function sendWhatsApp() {
        const meetingName = currentTab === 'meio' ? "MEIO DE SEMANA" : "FIM DE SEMANA";
        let txt = `*⏱️ TEMPO DAS PARTES*\n*(${meetingName})*\n\n`;
        let lastLabel = "";
        let hasData = false;
        let resumoHist = "";
        meetingParts.forEach(p => {
            if((currentTab === 'fim' && p.container === 'list-fim') || (currentTab === 'meio' && p.container !== 'list-fim')) {
                if(timers[p.id].sec > 0) {
                    hasData = true;
                    if(p.label !== lastLabel) { txt += `\n*${p.label}*\n`; lastLabel = p.label; }
                    const time = formatTime(timers[p.id].sec);
                    txt += `• ${p.nome}${participants[p.id] ? " ("+participants[p.id]+")" : ""}: ${time}\n`;
                    resumoHist += `${p.nome}: ${time} | `;
                }
            }
        });
        if(!hasData) { openModal("Aviso", "Não há tempos registrados.", () => {}, false); return; }
        const agora = new Date();
        history.push({ data: agora.toLocaleDateString() + " " + agora.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), resumo: resumoHist });
        localStorage.setItem('jw_history_v29', JSON.stringify(history));
        window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(txt));
    }

    render();
</script>
</body>
</html>
